<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VidStream — YouTube · Spotify · SoundCloud</title>
  <meta name="description" content="Stream music and videos from YouTube, Spotify, and SoundCloud — all in one premium web player.">
  <meta name="theme-color" content="#0a0a0f">

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">

  <!-- Google Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div id="app">

  <!-- ── App Body ────────────────────────────────────────── -->
  <div class="app-body">

    <!-- ── Sidebar ─────────────────────────────────────── -->
    <nav id="sidebar">
      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">🎬</div>
        <span class="logo-text">VidStream</span>
      </div>

      <!-- Nav Links -->
      <div class="nav-item active" onclick="">
        <span class="nav-icon">🔍</span> Discover
      </div>
      <div class="nav-item" onclick="showToast('Coming soon!','info')">
        <span class="nav-icon">❤️</span> Liked
      </div>
      <div class="nav-item" onclick="showToast('Coming soon!','info')">
        <span class="nav-icon">📋</span> Playlists
      </div>
      <div class="nav-item" onclick="showToast('Coming soon!','info')">
        <span class="nav-icon">🕐</span> History
      </div>

      <!-- Queue -->
      <div class="nav-section-label">
        Up Next <span id="queue-count" style="color:var(--accent3);margin-left:4px"></span>
      </div>
      <div id="queue-list"></div>
    </nav>

    <!-- ── Main ────────────────────────────────────────── -->
    <main id="main">

      <!-- Top Bar -->
      <div id="topbar">
        <!-- Search -->
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input
            id="search-input"
            type="text"
            placeholder="Search songs, artists, videos…"
            autocomplete="off"
            spellcheck="false"
          >
          <button id="search-btn">Search</button>
        </div>

        <!-- Source Tabs -->
        <div class="source-tabs">
          <button class="source-tab active" data-source="youtube">
            <span class="tab-icon">📺</span> YouTube
          </button>
          <button class="source-tab" data-source="spotify">
            <span class="tab-icon">🎵</span> Spotify
          </button>
          <button class="source-tab" data-source="soundcloud">
            <span class="tab-icon">🔊</span> SoundCloud
          </button>
        </div>
      </div>

      <!-- Content -->
      <div id="content"></div>

    </main>
  </div><!-- .app-body -->

  <!-- ── Player Bar ─────────────────────────────────────── -->
  <footer id="player-bar">

    <!-- Now Playing -->
    <div class="now-playing">
      <img id="now-thumb" class="now-thumb" src="" alt="" style="display:none">
      <div class="now-info">
        <div id="now-title"  class="now-title"  style="color:var(--text-3)">Nothing playing</div>
        <div id="now-artist" class="now-artist"></div>
      </div>
      <button id="now-like" class="now-like" title="Like">♡</button>
    </div>

    <!-- Controls -->
    <div class="player-controls">
      <div class="ctrl-btns">
        <button id="ctrl-shuffle" class="ctrl-btn" title="Shuffle">🔀</button>
        <button id="ctrl-prev"    class="ctrl-btn" title="Previous">⏮</button>
        <button id="ctrl-play"    class="ctrl-play" title="Play/Pause">▶</button>
        <button id="ctrl-next"    class="ctrl-btn" title="Next">⏭</button>
        <button id="ctrl-repeat"  class="ctrl-btn" title="Repeat">🔁</button>
      </div>
      <div class="seek-row">
        <span id="time-current" class="time-label">0:00</span>
        <div id="seek-bar" class="seek-bar">
          <div id="seek-fill"  class="seek-fill"  style="width:0%"></div>
          <div id="seek-thumb" class="seek-thumb"  style="left:0%"></div>
        </div>
        <span id="time-total" class="time-label">0:00</span>
      </div>
    </div>

    <!-- Volume -->
    <div class="volume-ctrl">
      <button id="vol-icon" class="vol-icon">🔊</button>
      <div id="vol-slider" class="vol-slider">
        <div id="vol-fill" class="vol-fill" style="width:80%"></div>
      </div>
    </div>

  </footer>

</div><!-- #app -->

<!-- ── Stream Loading Overlay ─────────────────────────────── -->
<div id="stream-overlay">
  <div class="overlay-card">
    <img id="overlay-thumb" class="overlay-thumb" src="" alt="" style="display:none">
    <div id="overlay-title" class="overlay-title">Loading…</div>
    <div id="overlay-sub"   class="overlay-sub">Preparing your stream</div>
    <div class="overlay-bar"><div class="overlay-bar-fill"></div></div>
    <div style="font-size:12px;color:var(--text-3)">yt-dlp is resolving the stream…</div>
  </div>
</div>

<!-- ── Video Player Modal ─────────────────────────────────── -->
<div id="video-modal">
  <div class="video-modal-inner">
    <button id="video-close" class="video-close" title="Close">✕</button>
    <video
      id="video-player"
      controls
      preload="auto"
      playsinline
    ></video>
  </div>
</div>

<!-- ── Toast Notifications ────────────────────────────────── -->
<div id="toast-container"></div>

<canvas id="waveform-canvas"></canvas>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
